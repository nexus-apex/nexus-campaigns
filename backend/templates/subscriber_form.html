{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Subscriber | NexusCampaigns{% endblock %}
{% block page_title %}{% if editing %}Edit Subscriber{% else %}New Subscriber{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="unsubscribed" {% if record.status == 'unsubscribed' %}selected{% endif %}>Unsubscribed</option>
          <option value="bounced" {% if record.status == 'bounced' %}selected{% endif %}>Bounced</option>
        </select>
      </div>
      <div class="form-group">
        <label>List Name</label>
        <input type="text" name="list_name" value="{{ record.list_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Subscribed Date</label>
        <input type="date" name="subscribed_date" value="{{ record.subscribed_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Tags</label>
        <input type="text" name="tags" value="{{ record.tags|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Subscriber</button>
      <a href="/subscribers/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
