{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Campaign | NexusCampaigns{% endblock %}
{% block page_title %}{% if editing %}Edit Campaign{% else %}New Campaign{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Campaign Type</label>
        <select name="campaign_type">
          <option value="newsletter" {% if record.campaign_type == 'newsletter' %}selected{% endif %}>Newsletter</option>
          <option value="promotional" {% if record.campaign_type == 'promotional' %}selected{% endif %}>Promotional</option>
          <option value="drip" {% if record.campaign_type == 'drip' %}selected{% endif %}>Drip</option>
          <option value="transactional" {% if record.campaign_type == 'transactional' %}selected{% endif %}>Transactional</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="scheduled" {% if record.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="sending" {% if record.status == 'sending' %}selected{% endif %}>Sending</option>
          <option value="sent" {% if record.status == 'sent' %}selected{% endif %}>Sent</option>
          <option value="paused" {% if record.status == 'paused' %}selected{% endif %}>Paused</option>
        </select>
      </div>
      <div class="form-group">
        <label>Sent Count</label>
        <input type="number" name="sent_count" value="{{ record.sent_count|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Open Rate</label>
        <input type="number" step="0.01" name="open_rate" value="{{ record.open_rate|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Click Rate</label>
        <input type="number" step="0.01" name="click_rate" value="{{ record.click_rate|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Scheduled Date</label>
        <input type="date" name="scheduled_date" value="{{ record.scheduled_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Campaign</button>
      <a href="/campaigns/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
